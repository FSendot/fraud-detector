# Copiar a /etc/nginx/conf.d/fraud-api.conf (Fedora/RHEL/Amazon Linux con nginx rpm)
# Ajustá el upstream si la API escucha en otro puerto.
#
# Tras editar: nginx -t && systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # Incluir localhost: si no, otro server con server_name localhost (Fedora) atiende antes.
    server_name localhost 127.0.0.1 _;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
